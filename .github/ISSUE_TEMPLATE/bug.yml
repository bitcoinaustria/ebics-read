name: Bug report
description: Report a reproducible defect using synthetic data.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, bank identifiers, private keys, or financial data.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide a minimal reproduction containing synthetic values only.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EBICSMIT and Python versions
    validations:
      required: true
