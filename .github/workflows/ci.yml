name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Upgrade packaging frontend
        run: python -m pip install --disable-pip-version-check "pip>=26.1.2"
      - name: Install
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Test
        run: python -m pytest

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Upgrade packaging frontend
        run: python -m pip install --disable-pip-version-check "pip>=26.1.2"
      - name: Install
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Format
        run: python -m ruff format --check .
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy
      - name: Security tests and aggregate coverage
        run: python -m pytest -q
      - name: Certificate branch coverage
        run: python -m coverage report --include=src/ebics_read/certificates.py --fail-under=90
      - name: HEV branch coverage
        run: python -m coverage report --include=src/ebics_read/hev.py --fail-under=90
      - name: Transport branch coverage
        run: python -m coverage report --include=src/ebics_read/transport.py --fail-under=85
      - name: XML branch coverage
        run: python -m coverage report --include=src/ebics_read/xml.py --fail-under=90
      - name: Compile
        run: python -m compileall -q src tests
      - name: Dependency audit
        run: python -m pip_audit --skip-editable

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Upgrade packaging frontend
        run: python -m pip install --disable-pip-version-check "pip>=26.1.2"
      - name: Install build frontend
        run: python -m pip install --disable-pip-version-check build
      - name: Build wheel and source distribution
        run: python -m build
      - name: Install wheel artifact
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Import installed artifact
        run: python -I -c "import ebics_read; assert ebics_read.__all__"
