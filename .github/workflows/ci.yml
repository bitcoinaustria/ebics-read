name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Upgrade packaging frontend
        run: python -m pip install --disable-pip-version-check "pip>=26.1.2"
      - name: Install
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Test
        run: python -m pytest

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Upgrade packaging frontend
        run: python -m pip install --disable-pip-version-check "pip>=26.1.2"
      - name: Install
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Format
        run: python -m ruff format --check .
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy
      - name: Compile
        run: python -m compileall -q src tests
      - name: Dependency audit
        run: python -m pip_audit --skip-editable

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Upgrade packaging frontend
        run: python -m pip install --disable-pip-version-check "pip>=26.1.2"
      - name: Install build frontend
        run: python -m pip install --disable-pip-version-check build
      - name: Build wheel and source distribution
        run: python -m build
      - name: Install wheel artifact
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Import installed artifact
        run: python -I -c "import ebicsmit; assert ebicsmit.__all__"
